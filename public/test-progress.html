<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>进度条拖拽测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .test-container {
      width: 90%;
      max-width: 600px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 30px;
      text-align: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .test-section {
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 16px;
      margin-bottom: 15px;
      color: rgba(255, 255, 255, 0.7);
    }

    .progress-container {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
    }

    .time {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      min-width: 50px;
      text-align: center;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      position: relative;
      cursor: pointer;
      transition: height 0.2s ease;
    }

    .progress-bar:hover {
      height: 8px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 3px;
      position: relative;
      transition: width 0.1s linear;
    }

    .progress-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      transition: transform 0.2s ease, opacity 0.2s ease;
      opacity: 0;
    }

    .progress-bar:hover .progress-thumb,
    .progress-bar.dragging .progress-thumb {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.2);
    }

    .progress-bar.dragging {
      height: 8px;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .play-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease;
    }

    .play-btn:hover {
      transform: scale(1.1);
    }

    .play-btn svg {
      width: 20px;
      height: 20px;
    }

    .status {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      padding: 15px;
      font-size: 13px;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .status-item:last-child {
      border-bottom: none;
    }

    .status-label {
      color: rgba(255, 255, 255, 0.5);
    }

    .status-value {
      color: #667eea;
      font-weight: 500;
    }

    .event-log {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      padding: 15px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 12px;
      font-family: 'Consolas', 'Monaco', monospace;
    }

    .log-item {
      padding: 4px 0;
      color: rgba(255, 255, 255, 0.6);
    }

    .log-item.click {
      color: #4ade80;
    }

    .log-item.drag-start {
      color: #fbbf24;
    }

    .log-item.drag-move {
      color: #60a5fa;
    }

    .log-item.drag-end {
      color: #f472b6;
    }

    .volume-test {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .volume-slider {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s ease;
    }

    .volume-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
  </style>
</head>
<body>
  <div class="test-container">
    <h1>🎵 进度条拖拽测试</h1>

    <div class="test-section">
      <div class="section-title">音频播放器</div>
      
      <div class="controls">
        <button class="play-btn" id="playBtn" onclick="togglePlay()">
          <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
        </button>
      </div>

      <div class="progress-container">
        <span class="time" id="currentTime">00:00</span>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
          <div class="progress-thumb" id="progressThumb" style="left: 0%"></div>
        </div>
        <span class="time" id="durationTime">00:00</span>
      </div>
    </div>

    <div class="test-section">
      <div class="section-title">实时状态</div>
      <div class="status">
        <div class="status-item">
          <span class="status-label">当前进度</span>
          <span class="status-value" id="progressPercent">0%</span>
        </div>
        <div class="status-item">
          <span class="status-label">播放状态</span>
          <span class="status-value" id="playStatus">暂停</span>
        </div>
        <div class="status-item">
          <span class="status-label">拖拽状态</span>
          <span class="status-value" id="dragStatus">未拖拽</span>
        </div>
      </div>
    </div>

    <div class="test-section">
      <div class="section-title">事件日志</div>
      <div class="event-log" id="eventLog">
        <div class="log-item">等待操作...</div>
      </div>
    </div>

    <div class="volume-test">
      <div class="section-title">音量滑块测试</div>
      <input type="range" class="volume-slider" min="0" max="100" value="70" id="volumeSlider" oninput="onVolumeChange(this.value)">
      <div class="status" style="margin-top: 15px;">
        <div class="status-item">
          <span class="status-label">当前音量</span>
          <span class="status-value" id="volumeValue">70%</span>
        </div>
      </div>
    </div>
  </div>

  <audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

  <script>
    const audio = document.getElementById('audio');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const progressThumb = document.getElementById('progressThumb');
    const currentTimeEl = document.getElementById('currentTime');
    const durationTimeEl = document.getElementById('durationTime');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const progressPercentEl = document.getElementById('progressPercent');
    const playStatusEl = document.getElementById('playStatus');
    const dragStatusEl = document.getElementById('dragStatus');
    const eventLog = document.getElementById('eventLog');
    const volumeValue = document.getElementById('volumeValue');

    let isDragging = false;
    let logCount = 0;

    function addLog(message, type = '') {
      logCount++;
      const logItem = document.createElement('div');
      logItem.className = 'log-item ' + type;
      logItem.textContent = `[${String(logCount).padStart(3, '0')}] ${message}`;
      eventLog.insertBefore(logItem, eventLog.firstChild);
      if (eventLog.children.length > 50) {
        eventLog.removeChild(eventLog.lastChild);
      }
    }

    function formatTime(seconds) {
      if (isNaN(seconds) || seconds <= 0) return '00:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function updateProgress() {
      const percent = (audio.currentTime / audio.duration) * 100 || 0;
      progressFill.style.width = percent + '%';
      progressThumb.style.left = percent + '%';
      currentTimeEl.textContent = formatTime(audio.currentTime);
      progressPercentEl.textContent = percent.toFixed(1) + '%';
    }

    function setProgress(percent) {
      if (audio.duration) {
        audio.currentTime = percent * audio.duration;
      }
      progressFill.style.width = (percent * 100) + '%';
      progressThumb.style.left = (percent * 100) + '%';
      progressPercentEl.textContent = (percent * 100).toFixed(1) + '%';
    }

    function togglePlay() {
      if (audio.paused) {
        audio.play();
        playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';
        playStatusEl.textContent = '播放中';
        addLog('开始播放');
      } else {
        audio.pause();
        playIcon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"></polygon>';
        playStatusEl.textContent = '暂停';
        addLog('暂停播放');
      }
    }

    progressBar.addEventListener('click', function(e) {
      if (isDragging) return;
      const rect = progressBar.getBoundingClientRect();
      const percent = (e.clientX - rect.left) / rect.width;
      setProgress(percent);
      addLog(`点击跳转到 ${(percent * 100).toFixed(1)}%`, 'click');
    });

    progressBar.addEventListener('mousedown', function(e) {
      if (e.button !== 0) return;
      e.preventDefault();
      isDragging = true;
      progressBar.classList.add('dragging');
      dragStatusEl.textContent = '拖拽中...';
      
      const rect = progressBar.getBoundingClientRect();
      const percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      setProgress(percent);
      addLog(`开始拖拽: ${(percent * 100).toFixed(1)}%`, 'drag-start');

      function handleMove(e) {
        if (!isDragging) return;
        const rect = progressBar.getBoundingClientRect();
        const percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        setProgress(percent);
        addLog(`拖拽移动: ${(percent * 100).toFixed(1)}%`, 'drag-move');
      }

      function handleUp() {
        isDragging = false;
        progressBar.classList.remove('dragging');
        dragStatusEl.textContent = '未拖拽';
        addLog('结束拖拽', 'drag-end');
        document.removeEventListener('mousemove', handleMove);
        document.removeEventListener('mouseup', handleUp);
      }

      document.addEventListener('mousemove', handleMove);
      document.addEventListener('mouseup', handleUp);
    });

    function onVolumeChange(value) {
      audio.volume = value / 100;
      volumeValue.textContent = value + '%';
      addLog(`音量调整: ${value}%`);
    }

    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('loadedmetadata', function() {
      durationTimeEl.textContent = formatTime(audio.duration);
      addLog(`音频加载完成，时长: ${formatTime(audio.duration)}`);
    });

    audio.addEventListener('ended', function() {
      playIcon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"></polygon>';
      playStatusEl.textContent = '已结束';
      addLog('播放结束');
    });

    addLog('页面加载完成，点击播放按钮开始测试');
  </script>
</body>
</html>
